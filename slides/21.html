<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Advanced Copilot Customization</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap"
        rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet" />
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: #0d1117;
            color: #e6edf3;
            overflow: hidden;
        }

        .slide-container {
            width: 1280px;
            height: 720px;
            display: flex;
            flex-direction: column;
            position: relative;
            background-color: #0d1117;
            overflow: hidden;
        }

        .mono-font {
            font-family: 'JetBrains Mono', monospace;
        }

        .grid-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 0V0H0V1H1V40H40V1H1Z' fill='%2330363d' fill-opacity='0.15'/%3E%3C/svg%3E");
            z-index: 0;
        }

        .glow-spot {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            z-index: 0;
        }

        .glow-orange {
            width: 700px;
            height: 700px;
            background-color: rgba(210, 153, 34, 0.12);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .glow-purple {
            width: 500px;
            height: 500px;
            background-color: rgba(188, 140, 255, 0.1);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            mix-blend-mode: screen;
        }

        .bg-symbol {
            position: absolute;
            font-family: 'JetBrains Mono', monospace;
            font-size: 420px;
            font-weight: 700;
            color: #161b22;
            z-index: 0;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            opacity: 0.6;
            pointer-events: none;
            user-select: none;
            letter-spacing: -30px;
        }

        .content-wrapper {
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            width: 100%;
            padding: 0 40px;
        }

        .section-badge {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #d29922;
            border: 1px solid rgba(210, 153, 34, 0.35);
            background-color: rgba(210, 153, 34, 0.1);
            padding: 8px 20px;
            border-radius: 4px;
            margin-bottom: 32px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .title-primary {
            font-size: 72px;
            font-weight: 800;
            line-height: 1.1;
            letter-spacing: -1px;
            color: #ffffff;
            text-align: center;
            margin-bottom: 24px;
            text-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .title-accent {
            color: #d29922;
        }

        .subtitle {
            font-size: 22px;
            color: #8b949e;
            text-align: center;
            max-width: 820px;
            line-height: 1.6;
            margin-bottom: 48px;
            font-weight: 300;
        }

        .separator {
            width: 80px;
            height: 4px;
            background-color: #30363d;
            border-radius: 2px;
            margin-bottom: 48px;
        }

        .pills-container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .concept-pill {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 22px;
            background-color: rgba(22, 27, 34, 0.85);
            border: 1px solid #30363d;
            border-radius: 100px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            color: #c9d1d9;
            backdrop-filter: blur(4px);
        }

        .pill-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }
    </style>
</head>

<body>
    <div class="slide-container">
        <div class="grid-bg"></div>
        <div class="glow-spot glow-orange"></div>
        <div class="glow-spot glow-purple"></div>
        <div class="bg-symbol">{}</div>
        <div class="content-wrapper">
            <div class="section-badge">
                <i class="fas fa-sliders-h"></i>
                Section 04 — Extensibility
            </div>
            <h1 class="title-primary">
                Advanced <span class="title-accent">Copilot</span><br>Customization
            </h1>
            <p class="subtitle">
                Extend, personalize, and automate GitHub Copilot with custom agents, instructions, prompt files, skills,
                and hooks.
            </p>
            <div class="separator"></div>
            <div class="pills-container">
                <div class="concept-pill">
                    <div class="pill-dot" style="background:#d29922;"></div>Custom Agents
                </div>
                <div class="concept-pill">
                    <div class="pill-dot" style="background:#3fb950;"></div>Custom Instructions
                </div>
                <div class="concept-pill">
                    <div class="pill-dot" style="background:#58a6ff;"></div>Prompt Files
                </div>
                <div class="concept-pill">
                    <div class="pill-dot" style="background:#bc8cff;"></div>Skills
                </div>
                <div class="concept-pill">
                    <div class="pill-dot" style="background:#f78166;"></div>Hooks
                </div>
            </div>
        </div>
    </div>
</body>

</html>
